<!DOCTYPE html>
<html>
    <head>
        <title>RC Pricing</title>
        <link rel="stylesheet" href="style.css">
        <script src="script.js"></script>
    </head>
    <body>
        <header class="header">
            <h1>
                System Pricing
            </h1>
        </header>
        <div class="spacer"></div>
        <form method="get" onsubmit="form_submitted()">
            <header class="forms">           
            <label >CPUs: <select id = "CPUs" name="cpus">
                <option value = "0">0</option>
                <option value = "1">1</option>
                <option value = "2">2</option>
                <option value = "4">4</option>
                <option value = "8">8</option>
                <option value = "12">12</option>
                <option value = "16">16</option>
                <option value = "24">24</option>
                <option value = "32">32</option>
                <option value = "36">36</option>
                <option value = "40">40</option>
                <option value = "48">48</option>
            </select></label>
            <label>Memory(GB): <select id = "memory" name="memory">
                <option value = "0">0</option>
                <option value = "1">1</option>
                <option value = "2">2</option>
                <option value = "4">4</option>
                <option value = "8">8</option>
                <option value = "12">12</option>
                <option value = "16">16</option>
                <option value = "24">24</option>
                <option value = "32">32</option>
                <option value = "36">36</option>
                <option value = "40">40</option>
                <option value = "48">48</option>
            </select> <br/></label>
            </header>
            <label>Disk Space(GB): <input id = "disk_space" name="disk"/> <br/></label>
            <label>DartFS Storage(TB): <input id = "dartfs" name="dartfs"/> <br/></label>
            <label>SysAdmin: <input type="checkbox" id = "sysadmin" name="sysadmin"/> <br/></label>
            <div class="spacer"></div>
            <input type="submit"> <br/>
        </form>
    </body>
</html>
